<section id="must-read" class="must-read" aria-labelledby="must-read-title">
  <div class="section-head">
    <p class="eyebrow">Must Read</p>
    <h2 id="must-read-title">Books for deeper study</h2>
  </div>

  <div class="book-list">
    @for (book of books; track book.isbn10) {
      <article class="book-card">
        <a class="book-cover" [href]="book.affiliateUrl" target="_blank" rel="sponsored noopener">
          <img [appLazyImage]="book.imageUrl" [alt]="book.imageAlt" decoding="async" />
        </a>
        <div class="book-copy">
          <p class="book-meta">{{ book.format }} · {{ book.publicationDate }}</p>
          <h3>
            <a [href]="book.affiliateUrl" target="_blank" rel="sponsored noopener">{{ book.title }}</a>
          </h3>
          <p class="book-author">by {{ book.author }}</p>
          <p class="book-desc">{{ book.description }}</p>
          <dl class="book-details" aria-label="Book details">
            <div>
              <dt>Publisher</dt>
              <dd>{{ book.publisher }}</dd>
            </div>
            <div>
              <dt>Length</dt>
              <dd>{{ book.pages }} pages</dd>
            </div>
            <div>
              <dt>ISBN-10</dt>
              <dd>{{ book.isbn10 }}</dd>
            </div>
          </dl>
          <a class="btn btn-primary" [href]="book.affiliateUrl" target="_blank" rel="sponsored noopener">View on Amazon</a>
        </div>
      </article>
    }
  </div>
</section>
